when:
  - event: cron
    cron: renovate
  - event: manual

steps:
  - name: generate-github-token
    image: docker.io/alpine@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    commands:
      - apk add curl jo jq openssl
      - echo "export RENOVATE_TOKEN=$(./generate-app-token.sh)" > envvars
    environment:
      SCOPE: orgs/RoboTeamTwente
      CLIENT_ID: { from_secret: github-client-id }
      PRIVATE_KEY: { from_secret: github-private-key }

  - name: renovate
    image: docker.io/renovate/renovate@sha256:6a5475cd62046abc541ebb50b19b2b737ee52cc17153ab5700027afa51186394
    commands: ['. ./envvars && renovate']
    environment:
      RENOVATE_AUTODISCOVER: 'true'
      RENOVATE_PLATFORM_COMMIT: 'true'
